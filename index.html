<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Tracker - Real-time Sync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafaf8;
            color: #0b0b0b;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .status {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 6px;
            border-left: 4px solid #ccc;
        }

        .status.connected {
            background: #d4edda;
            border-left-color: #28a745;
            color: #155724;
        }

        .setup-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .setup-box h2 {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .setup-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ffc107;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0dc;
        }

        .card-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: 600;
        }

        .positive {
            color: #0ca30c;
        }

        .negative {
            color: #d03b3b;
        }

        .form-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0dc;
            margin-bottom: 30px;
        }

        .form-box h2 {
            font-size: 16px;
            margin-bottom: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="number"] {
            padding: 10px;
            border: 1px solid #e0e0dc;
            border-radius: 4px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-add {
            background: #2a78d6;
            color: white;
        }

        .btn-add:hover {
            background: #1f5aa8;
        }

        .btn-cancel {
            background: white;
            color: #666;
            border: 1px solid #e0e0dc;
        }

        .btn-cancel:hover {
            background: #f9f9f7;
        }

        .loading-text {
            font-size: 12px;
            color: #2a78d6;
            display: none;
        }

        .investment-list {
            background: white;
            padding: 0;
            border-radius: 8px;
            border: 1px solid #e0e0dc;
            overflow: hidden;
        }

        .investment-item {
            padding: 15px;
            border-bottom: 1px solid #e0e0dc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .investment-item:last-child {
            border-bottom: none;
        }

        .investment-info {
            flex: 1;
        }

        .investment-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .investment-details {
            font-size: 12px;
            color: #888;
            display: flex;
            gap: 20px;
        }

        .investment-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            background: white;
            border: 1px solid #e0e0dc;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-small:hover {
            background: #f9f9f7;
        }

        .btn-delete {
            color: #d03b3b;
        }

        .empty {
            text-align: center;
            color: #888;
            padding: 30px;
        }

        h2 {
            font-size: 16px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .investment-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .investment-actions {
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Investment Tracker</h1>
        
        <div class="status" id="status">
            ⚠️ Not connected to Google Sheets
        </div>

        <!-- Setup Section -->
        <div class="setup-box" id="setupBox">
            <h2>🔗 Connect Your Google Sheet</h2>
            <p style="font-size: 12px; margin-bottom: 10px; color: #666;">
                Paste your Google Apps Script URL here:
            </p>
            <input 
                type="text" 
                id="scriptUrl" 
                placeholder="https://script.google.com/macros/d/..." 
            >
            <button class="btn-add" onclick="saveScriptUrl()">Connect Sheet</button>
        </div>

        <!-- Summary Cards -->
        <div class="summary">
            <div class="card">
                <div class="card-label">Total Invested</div>
                <div class="card-value" id="totalInvested">$0</div>
            </div>
            <div class="card">
                <div class="card-label">Current Value</div>
                <div class="card-value" id="totalValue">$0</div>
            </div>
            <div class="card">
                <div class="card-label">Gain/Loss</div>
                <div class="card-value" id="totalGain">$0</div>
            </div>
            <div class="card">
                <div class="card-label">Return %</div>
                <div class="card-value" id="returnPercent">0%</div>
            </div>
        </div>

        <!-- Form -->
        <div class="form-box">
            <h2 id="formTitle">Add Investment</h2>
            <div class="form-grid">
                <input type="text" id="investmentName" placeholder="Name (e.g., Apple)">
                <input type="number" id="amountInvested" placeholder="Amount Invested" step="0.01">
                <input type="number" id="currentValue" placeholder="Current Value" step="0.01">
            </div>
            <div class="button-group">
                <button class="btn-add" id="addBtn" onclick="addInvestment()">Add</button>
                <button class="btn-cancel" id="cancelBtn" onclick="cancelEdit()" style="display: none;">Cancel</button>
                <span class="loading-text" id="loadingText">Saving...</span>
            </div>
        </div>

        <!-- Investments List -->
        <h2>Your Investments <span id="investmentCount">(0)</span></h2>
        <div class="investment-list" id="investmentList"></div>
    </div>

    <script>
        let investments = [];
        let scriptUrl = null;
        let editingId = null;

        // Load config
        function loadConfig() {
            scriptUrl = 'https://script.google.com/macros/s/AKfycbwg4yjcOVXJqSygPdOr-BOtQkKn6QzPAeHqczExYcMh2-ePyAt3gZHqt5CVzYKbxW23/exec';
            updateStatus();
        }

        // Save script URL
        function saveScriptUrl() {
            const url = document.getElementById('scriptUrl').value.trim();
            if (!url) {
                alert('Please paste a valid URL');
                return;
            }
            localStorage.setItem('scriptUrl', url);
            scriptUrl = url;
            document.getElementById('scriptUrl').value = '';
            document.getElementById('setupBox').style.display = 'none';
            updateStatus();
        }

        // Update status display
        function updateStatus() {
            const statusDiv = document.getElementById('status');
            if (scriptUrl) {
                statusDiv.textContent = '✅ Connected to Google Sheets';
                statusDiv.classList.add('connected');
                document.getElementById('setupBox').style.display = 'none';
            } else {
                statusDiv.textContent = '⚠️ Not connected to Google Sheets';
                statusDiv.classList.remove('connected');
                document.getElementById('setupBox').style.display = 'block';
            }
        }

        // Send data to Google Sheets
        async function sendToGoogleSheets(investment) {
            if (!scriptUrl) {
                alert('Please connect your Google Sheet first');
                return false;
            }

            try {
                const response = await fetch(scriptUrl, {
                    method: 'POST',
                    body: JSON.stringify({
                        name: investment.name,
                        amountInvested: investment.amountInvested,
                        currentValue: investment.currentValue
                    })
                });

                const result = await response.json();
                if (result.success) {
                    return true;
                } else {
                    alert('Error: ' + result.error);
                    return false;
                }
            } catch (error) {
                alert('Failed to save to Google Sheets. Check your URL.');
                console.error(error);
                return false;
            }
        }

        // Add investment
        async function addInvestment() {
            const name = document.getElementById('investmentName').value.trim();
            const amount = parseFloat(document.getElementById('amountInvested').value);
            const value = parseFloat(document.getElementById('currentValue').value);

            if (!name || isNaN(amount) || isNaN(value)) {
                alert('Please fill in all fields');
                return;
            }

            const btn = document.getElementById('addBtn');
            const loading = document.getElementById('loadingText');

            btn.disabled = true;
            loading.style.display = 'inline';

            const investment = {
                id: editingId || Date.now(),
                name,
                amountInvested: amount,
                currentValue: value,
                timestamp: new Date().toISOString()
            };

            // Send to Google Sheets
            const success = await sendToGoogleSheets(investment);

            if (success) {
                // Update local storage
                if (editingId) {
                    investments = investments.map(inv => inv.id === editingId ? investment : inv);
                    editingId = null;
                } else {
                    investments.push(investment);
                }

                localStorage.setItem('investments', JSON.stringify(investments));
                
                // Clear form
                document.getElementById('investmentName').value = '';
                document.getElementById('amountInvested').value = '';
                document.getElementById('currentValue').value = '';
                document.getElementById('formTitle').textContent = 'Add Investment';
                document.getElementById('cancelBtn').style.display = 'none';
                document.getElementById('addBtn').textContent = 'Add';

                render();
            }

            btn.disabled = false;
            loading.style.display = 'none';
        }

        // Edit investment
        function editInvestment(id) {
            const inv = investments.find(i => i.id === id);
            if (inv) {
                document.getElementById('investmentName').value = inv.name;
                document.getElementById('amountInvested').value = inv.amountInvested;
                document.getElementById('currentValue').value = inv.currentValue;
                document.getElementById('formTitle').textContent = 'Edit Investment (local only)';
                document.getElementById('addBtn').textContent = 'Update';
                document.getElementById('cancelBtn').style.display = 'inline-block';
                editingId = id;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Delete investment
        function deleteInvestment(id) {
            if (confirm('Delete this investment?')) {
                investments = investments.filter(inv => inv.id !== id);
                localStorage.setItem('investments', JSON.stringify(investments));
                render();
            }
        }

        // Cancel edit
        function cancelEdit() {
            document.getElementById('investmentName').value = '';
            document.getElementById('amountInvested').value = '';
            document.getElementById('currentValue').value = '';
            document.getElementById('formTitle').textContent = 'Add Investment';
            document.getElementById('addBtn').textContent = 'Add';
            document.getElementById('cancelBtn').style.display = 'none';
            editingId = null;
        }

        // Render everything
        function render() {
            // Calculate totals
            const totalInvested = investments.reduce((sum, inv) => sum + inv.amountInvested, 0);
            const totalValue = investments.reduce((sum, inv) => sum + inv.currentValue, 0);
            const totalGain = totalValue - totalInvested;
            const returnPercent = totalInvested > 0 ? (totalGain / totalInvested) * 100 : 0;

            // Update cards
            document.getElementById('totalInvested').textContent = '$' + Math.round(totalInvested).toLocaleString();
            document.getElementById('totalValue').textContent = '$' + Math.round(totalValue).toLocaleString();
            
            const gainEl = document.getElementById('totalGain');
            gainEl.textContent = '$' + Math.round(totalGain).toLocaleString();
            gainEl.className = 'card-value ' + (totalGain >= 0 ? 'positive' : 'negative');

            const returnEl = document.getElementById('returnPercent');
            returnEl.textContent = returnPercent.toFixed(1) + '%';
            returnEl.className = 'card-value ' + (returnPercent >= 0 ? 'positive' : 'negative');

            // Update count
            document.getElementById('investmentCount').textContent = `(${investments.length})`;

            // Render list
            const list = document.getElementById('investmentList');
            if (investments.length === 0) {
                list.innerHTML = '<div class="empty">No investments yet. Add one above! 👆</div>';
                return;
            }

            list.innerHTML = investments.map(inv => {
                const gain = inv.currentValue - inv.amountInvested;
                const gainPercent = (gain / inv.amountInvested) * 100;
                const gainClass = gain >= 0 ? 'positive' : 'negative';

                return `
                    <div class="investment-item">
                        <div class="investment-info">
                            <div class="investment-name">${inv.name}</div>
                            <div class="investment-details">
                                <span>Invested: $${Math.round(inv.amountInvested).toLocaleString()}</span>
                                <span>Current: $${Math.round(inv.currentValue).toLocaleString()}</span>
                                <span class="${gainClass}">
                                    ${gain >= 0 ? '+' : ''}$${Math.round(gain).toLocaleString()} (${gainPercent.toFixed(1)}%)
                                </span>
                            </div>
                        </div>
                        <div class="investment-actions">
                            <button class="btn-small" onclick="editInvestment(${inv.id})">Edit</button>
                            <button class="btn-small btn-delete" onclick="deleteInvestment(${inv.id})">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Load on startup
        function init() {
            loadConfig();
            const saved = localStorage.getItem('investments');
            if (saved) {
                investments = JSON.parse(saved);
            }
            render();
        }

        init();
    </script>
</body>
</html>
